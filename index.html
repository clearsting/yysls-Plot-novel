<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>燕云十六声 · 缘起 | 全角色剧情互动小说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a120b;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', '宋体', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: #2e241f;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            border: 1px solid #c2a575;
        }
        .status-bar {
            background: #1f1813;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            color: #e9d6b0;
            font-size: 14px;
            border-bottom: 1px solid #4a3727;
            font-family: monospace;
        }
        .day-counter, .affection-bar {
            background: #2a1e16;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .sprite-area {
            height: 280px;
            background: #2a1f18;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 2px solid #c2a575;
            background-image: radial-gradient(circle at 10% 20%, #3e2c20 1%, transparent 1%);
            background-size: 20px 20px;
        }
        .sprite-placeholder {
            text-align: center;
            color: #b89a6e;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .sprite-img {
            max-height: 260px;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .dialog-box {
            background: #221b15e6;
            backdrop-filter: blur(8px);
            margin: 20px;
            padding: 24px 28px;
            border-radius: 48px;
            border: 1px solid #c2a57560;
            min-height: 200px;
        }
        .speaker {
            font-size: 20px;
            font-weight: bold;
            color: #f3d382;
            margin-bottom: 12px;
            border-left: 4px solid #e4b363;
            padding-left: 16px;
        }
        .message {
            font-size: 18px;
            line-height: 1.55;
            color: #f7efdf;
            text-shadow: 0 1px 1px black;
            white-space: pre-wrap;
        }
        .choices-area {
            padding: 12px 20px 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }
        .choice-btn {
            background: #302418;
            border: 1px solid #c6a15b;
            color: #ffefcf;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .choice-btn:hover {
            background: #4f3824;
            border-color: #ecc27a;
            transform: scale(1.02);
        }
        .reset-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2c1e14;
            border: 1px solid #b48b48;
            color: #dbbd86;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            z-index: 99;
        }
        @media (max-width: 600px) {
            .dialog-box { padding: 18px; margin: 12px; }
            .message { font-size: 16px; }
            .choice-btn { font-size: 14px; padding: 8px 12px; }
            .sprite-area { height: 220px; }
        }
    </style>
</head>

    const spritePlaceholder = document.getElementById("spritePlaceholder");
    const charSprite = document.getElementById("charSprite");
    
    function setSprite(charKey) {
        if(!charKey) {
            charSprite.style.display = "none";
            spritePlaceholder.style.display = "block";
            return;
        }
        const char = fullScripts[charKey];
        if(char) {
            spritePlaceholder.style.display = "none";
            charSprite.style.display = "block";
            charSprite.src = `images/${char.imgKey}.png`;
            charSprite.alt = char.name;
            charSprite.onerror = () => {
                charSprite.style.display = "none";
                spritePlaceholder.style.display = "block";
                spritePlaceholder.innerText = `✨ ${char.name} · 缘起 ✨`;
            };
        } else {
            charSprite.style.display = "none";
            spritePlaceholder.style.display = "block";
        }
    }
    
    function updateAffectionUI() {
        affectionSpan.innerText = `❤️ 羁绊 · ${gameState.affection>0?gameState.affection:'初见'}`;
    }
    
    function render() {
        if(gameState.stage === "PROLOGUE") {
            speakerEl.innerText = "【 沈寻 · 考古手记 】";
            const prologueTexts = [
                "我叫沈寻。考古研究员。\n\n那页从五代墓葬中出土的手记上写着——\n“将军战于滹沱……全军覆没……朝廷削其名……碑不得立……后人无祭……”\n十个名字，十条被抹去的命。\n我以为我只是来找真相的。后来我发现，我在找的，是他们还活过的证据。",
                "我站在滹沱河畔，风很大。地宫里的幽蓝色石头能编织过去的幻影。\n我喝下幻境之酒，决定去见一见那些被历史碾碎的人。\n他们等了一千年，等一句“我来看你了”。"
            ];
            dialogEl.innerText = prologueTexts[gameState.prologueStep] || prologueTexts[0];
            dayDisplay.innerText = "序章 · 燕云初啼";
            setSprite(null);
            if(gameState.prologueStep === 0) {
                choicesContainer.innerHTML = `<div class="choice-btn" data-choice="nextPrologue">✧ 翻开下一页 ✧</div>`;
            } else {
                choicesContainer.innerHTML = `<div class="choice-btn" data-choice="toChapterSelect">✧ 踏入幻境 · 缘起 ✧</div>`;
            }
        }
        else if(gameState.stage === "CHAPTER_SELECT") {
            speakerEl.innerText = "十段人生 · 十段错过";
            dialogEl.innerText = "十道幻影在你身侧低语：“你只能陪一个人走过最后七日。” 选择你的归途。";
            setSprite(null);
            dayDisplay.innerText = "分岔 · 缘定一人";
            let btns = "";
            for(let key of characterKeys) {
                btns += `<div class="choice-btn" data-route="${key}">✨ ${fullScripts[key].name} · ${fullScripts[key].title}</div>`;
            }
            choicesContainer.innerHTML = btns;
        }
        else if(gameState.stage === "ROUTE_PLAY") {
            const char = fullScripts[gameState.currentChar];
            setSprite(gameState.currentChar);
            dayDisplay.innerText = `${char.name} · 缘线`;
            updateAffectionUI();
            const contentParts = char.content;
            if(gameState.contentIndex < contentParts.length) {
                speakerEl.innerText = char.name;
                dialogEl.innerText = contentParts[gameState.contentIndex];
                const isLast = (gameState.contentIndex === contentParts.length-1);
                choicesContainer.innerHTML = isLast ? 
                    `<div class="choice-btn" data-choice="finishRoute">✧ 归于现实 · 终章 ✧</div>` :
                    `<div class="choice-btn" data-choice="nextContent">✧ 继续 · 共度朝夕 ✧</div>`;
            } else {
                // 显示结局独白
                speakerEl.innerText = "终章 · 枯骨";
                dialogEl.innerText = `${char.epilogue}\n\n—— 你跪在坟前，将遗物轻放。“后会有期。”风吹过旷野，像一声跨越千年的应答。`;
                choicesContainer.innerHTML = `<div class="choice-btn" data-choice="backToSelect">✧ 重历红尘 · 再择一人 ✧</div>`;
            }
        }
        else if(gameState.stage === "EPILOGUE_ALL") {
            speakerEl.innerText = "终章 · 归处";
            dialogEl.innerText = "我站在滹沱河畔。夕阳西下，身后是十座坟。\n十个人，十条被历史碾碎的生命。\n我从背包里拿出十样遗物，放在十座坟前。\n“我来看你们了。你们的信，我收到了。你们的话，我替你们带到了。”\n我跪下来，磕了十个头。\n“后会有期。”\n风吹过滹沱河，像是十个人在远处轻轻应了一声——“后会有期。”\n碑上的名字在夕阳下闪闪发光。\n他们不是无名氏。\n他们被人记得。\n被我。永远。";
            setSprite(null);
            dayDisplay.innerText = "缘起 · 终章";
            choicesContainer.innerHTML = `<div class="choice-btn" data-choice="resetFull">✧ 重回燕云 · 再续前缘 ✧</div>`;
        }
    }
    
    function applyChoice(choice, routeKey=null) {
        if(choice === "nextPrologue") {
            gameState.prologueStep++;
            render();
        }
        else if(choice === "toChapterSelect") {
            gameState.stage = "CHAPTER_SELECT";
            render();
        }
        else if(choice === "nextContent") {
            gameState.contentIndex++;
            render();
        }
        else if(choice === "finishRoute") {
            // 当前角色线结束，展示结局后返回选人界面（或显示全员结局）
            gameState.stage = "EPILOGUE_ALL";
            render();
        }
        else if(choice === "backToSelect") {
            gameState.stage = "CHAPTER_SELECT";
            gameState.currentChar = null;
            gameState.contentIndex = 0;
            render();
        }
        else if(choice === "resetFull") {
            resetGame();
        }
        else if(routeKey) {
            // 选择角色线
            gameState.currentChar = routeKey;
            gameState.contentIndex = 0;
            gameState.stage = "ROUTE_PLAY";
            render();
        }
    }
    
    function resetGame() {
        gameState = {
            stage: "PROLOGUE",
            currentChar: null,
            contentIndex: 0,
            affection: 0,
            prologueStep: 0
        };
        render();
    }
    
    // 事件监听
    document.getElementById("resetGameBtn").addEventListener("click", resetGame);
    document.getElementById("choicesContainer").addEventListener("click", (e) => {
        const btn = e.target.closest(".choice-btn");
        if(!btn) return;
        if(btn.dataset.choice) {
            applyChoice(btn.dataset.choice);
        } else if(btn.dataset.route) {
            applyChoice(null, btn.dataset.route);
        }
    });
    
    resetGame();
</script>
</body>
</html>
